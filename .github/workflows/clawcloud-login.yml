# 文件名: .github/workflows/clawcloud-login.yml
name: ClawCloud Run Auto Login (2FA Support + Multi-Page Monitor)

on:
  schedule:
    - cron: '0 0 */15 * *'
  workflow_dispatch:

jobs:
  auto-login:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.9'

      - name: Install Dependencies
        run: |
          python -m pip install --upgrade pip
          pip install playwright pyotp
          playwright install chromium

      - name: Create Debug Directory (Ensure Exists)
        run: |
          mkdir -p screenshots
          touch screenshots/initial_log.txt
          echo "Debug directory created at $(date)" > screenshots/initial_log.txt
        shell: bash

      - name: Run Login Script (Capture All Logs)
        env:
          GH_USERNAME: ${{ secrets.GH_USERNAME }}
          GH_PASSWORD: ${{ secrets.GH_PASSWORD }}
          GH_2FA_SECRET: ${{ secrets.GH_2FA_SECRET }}
          CI: "true"
        run: |
          python -u login_script.py 2>&1 | tee screenshots/full_execution.log
        shell: bash

      - name: List All Files (Debug)
        if: always()
        run: |
          echo "=== Working Directory ==="
          ls -la
          echo "=== Screenshots Directory ==="
          ls -la screenshots/
          echo "=== Page Count Log ==="
          cat screenshots/page_count_log.txt || echo "Page count log not found"
        shell: bash

      - name: Upload All Debug Files (Multi-Page Screenshots + Logs)
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: multi-page-debug-files
          path: |
            login_result.png
            screenshots/
            # 确保所有日志都被上传
            screenshots/page_count_log.txt
            screenshots/full_execution.log
            screenshots/initial_log.txt
          retention-days: 7
          if-no-files-found: warn

      - name: Print Core Logs to Console
        if: always()
        run: |
          echo "=== Full Execution Log ==="
          cat screenshots/full_execution.log || echo "Full log not found"
          echo "=== Page Count Log ==="
          cat screenshots/page_count_log.txt || echo "Page count log not found"
        shell: bash
